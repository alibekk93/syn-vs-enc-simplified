# =============================================================================
# models.yaml — Model Configuration
# =============================================================================
#
# GLOBAL SETTINGS:
#   random_seed   Seed for reproducibility across all models
#   test_size     Fraction of data held out for testing (e.g. 0.2 = 20%)
#   val_size      Fraction of training data used for validation.
#                 Used for early stopping in XGBoost and MLP — set to 0 to disable.
#   stratify      Whether to stratify splits by the target column
#
# MODELS:
#   Each entry under `models` defines one model to train.
#   name          Must match a key in SUPPORTED_MODELS (see models.py)
#   hyperparameters  Passed directly to the model constructor
#
#   Supported model names:
#     - logistic_regression
#     - random_forest
#     - xgboost
#     - svm
#     - mlp
#
# METRICS:
#   Evaluated on the test set after training.
#   Supported: accuracy, precision, recall, f1, roc_auc
#
# OUTPUT:
#   results_dir   Where to save per-model result JSONs
#
# =============================================================================

random_seed: 42
test_size: 0.2
val_size: 0.1       # used for early stopping in xgboost and mlp only
stratify: true

models:
  - name: logistic_regression
    hyperparameters:
      max_iter: 1000
      solver: lbfgs
      random_state: 42

  - name: random_forest
    hyperparameters:
      n_estimators: 100
      max_depth: 10
      random_state: 42

  - name: xgboost
    hyperparameters:
      n_estimators: 200
      learning_rate: 0.1
      max_depth: 5
      random_state: 42
      eval_metric: logloss
      early_stopping_rounds: 20

  - name: svm
    hyperparameters:
      kernel: rbf
      C: 1.0
      probability: true

  - name: mlp
    hyperparameters:
      hidden_layer_sizes: [128, 64]
      activation: relu
      max_iter: 200
      early_stopping: true
      validation_fraction: 0.1
      random_state: 42

metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc

output:
  results_dir: results