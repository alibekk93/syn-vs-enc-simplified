# =============================================================================
# fhe.yaml — FHE Quantization & Sweep Configuration
# =============================================================================
#
# Controls quantization parameters and optional parameter sweeps for
# Fully Homomorphic Encryption (FHE) models using Concrete ML.
#
# OVERVIEW:
#   - This file now fully controls both:
#       1. Standard FHE execution
#       2. Ablation-style experiments (via parameter sweeps)
#   - The separate ablation pipeline has been removed.
#
#
# -----------------------------------------------------------------------------
# SWEEP (ABSTRACTION OF ABLATION)
# -----------------------------------------------------------------------------
# Enables iterative runs over multiple n_bits values.
#
# If enabled:
#   - The FHE pipeline will run once per n_bits value.
#   - Each run is independently trained, evaluated, and profiled.
#   - Results are saved with n_bits included in filenames.
#
# Supported formats:
#
#   Range:
#     start / end (inclusive) with optional step
#
#   Explicit list:
#     n_bits: [2, 3, 4, 6, 8]
#
# Behavior:
#   - If enabled: overrides all model n_bits values
#   - If disabled: uses per-model n_bits below
#   - If start == end: only one run is executed
#
# Output:
#   - Metrics → results/metrics/
#   - Profiling → results/resource_profiles/
#
# -----------------------------------------------------------------------------

sweep:
  enabled: true

  # Option 1: range
  n_bits:
    start: 2
    end: 8
    step: 1

  # Option 2: explicit list (alternative)
  # n_bits: [2, 3, 4, 6, 8]


# -----------------------------------------------------------------------------
# MODELS
# -----------------------------------------------------------------------------
# Per-model FHE quantization configuration.
#
# These settings are:
#   - Used ONLY if sweep.enabled = false
#   - Otherwise overridden by sweep iteration values
#
# Each key corresponds to a model in config/models.yaml
#
# -----------------------------------------------------------------------------

models:

  logistic_regression:
    # Number of quantization bits
    n_bits: 2

  random_forest:
    n_bits: 2

  xgboost:
    n_bits: 2

  # ---------------------------------------------------------------------------
  # MLP-SPECIFIC PARAMETERS (optional)
  # ---------------------------------------------------------------------------
  # Used only for the NeuralNetClassifier in Concrete ML
  #
  # mlp:
  #   n_w_bits: 2        # weight quantization
  #   n_a_bits: 2        # activation quantization
  #   n_accum_bits: 2    # accumulator precision
  #   n_layers: 2        # number of quantized layers


# -----------------------------------------------------------------------------
# NOTES
# -----------------------------------------------------------------------------
#
# - Only models supported by Concrete ML can be used in FHE mode.
#
# - Sweep mode enables systematic exploration of this trade-off.
#
# - All runs (sweep or single) automatically:
#       - compute evaluation metrics
#       - perform resource profiling (time, memory, storage, FHE complexity)
#
# - Output files include n_bits in their names, ensuring:
#       - no overwriting
#       - reproducibility
#       - easy comparison
#
# Example output filenames:
#
#   results/metrics/
#     fhe__logistic_regression__heart_disease__n2__test__metrics.json
#
#   results/resource_profiles/
#     fhe__logistic_regression__heart_disease__n2.json
#
# -----------------------------------------------------------------------------