# =============================================================================
# fhe.yaml — FHE Quantization Configuration
# =============================================================================
#
# Controls quantization parameters for FHE models using Concrete ML.
#
# Every `pipelines.fhe.run()` call is a single pass: each model trains and
# evaluates at the n_bits value configured for it below (or the value
# passed via `run(n_bits=...)` / `python main.py run-experiment --n-bits N`,
# which overrides every model's n_bits for that run).
#
# -----------------------------------------------------------------------------
# SWEEP (FOR PARALLEL EXECUTION ONLY)
# -----------------------------------------------------------------------------
# This block is NOT read by `run()`. It's read only by
# `python main.py list-n-bits`, which expands it into a flat file
# (one n_bits value per line) for launching one `run-experiment --n-bits N`
# process per value — in parallel, locally or as separate cluster jobs.
# Each process is independent and writes uniquely-named output files
# (n_bits is embedded in every filename), so no aggregation step is needed.
#
# Supported formats:
#
#   Range:
#     start / end (inclusive) with optional step
#
#   Explicit list:
#     n_bits: [2, 3, 4, 6, 8]
#
# -----------------------------------------------------------------------------

sweep:
  enabled: true

  # Option 1: range
  n_bits:
    start: 2
    end: 8
    step: 1

  # Option 2: explicit list (alternative)
  # n_bits: [2, 3, 4, 6, 8]


# -----------------------------------------------------------------------------
# DEVICE
# -----------------------------------------------------------------------------
# Compilation target for Concrete ML's `.compile()` call. "cpu" works
# anywhere. "cuda" requires:
#   1. A CUDA-enabled GPU, visible to the process.
#   2. The GPU build of concrete-python:
#        pip uninstall concrete-python
#        pip install --extra-index-url https://pypi.zama.ai/gpu concrete-python
#
# A model compiled with device="cuda" cannot run on a non-GPU machine, so
# leave this as "cpu" for local/dev work. Override per-run with
# `run(device=...)` / `--device cuda` (see `main.py run-experiment` and
# `run-single-bootstrap`) rather than editing this default, so the same
# config still works for quick local testing.
#
# Startup fails fast with a clear error if "cuda" is requested but
# unavailable, rather than failing deep inside `.compile()`.
# -----------------------------------------------------------------------------

device: cuda


# -----------------------------------------------------------------------------
# MODELS
# -----------------------------------------------------------------------------
# Per-model FHE quantization configuration.
#
# These are the n_bits values `run()` always uses, unless overridden
# wholesale by `run(n_bits=...)` / `--n-bits N` for a given process.
#
# Each key corresponds to a model in config/models.yaml
#
# -----------------------------------------------------------------------------

models:

  logistic_regression:
    # Number of quantization bits
    n_bits: 2

  random_forest:
    n_bits: 2

  xgboost:
    n_bits: 2

  # ---------------------------------------------------------------------------
  # MLP-SPECIFIC PARAMETERS (optional)
  # ---------------------------------------------------------------------------
  # Used only for the NeuralNetClassifier in Concrete ML
  #
  # mlp:
  #   n_w_bits: 2        # weight quantization
  #   n_a_bits: 2        # activation quantization
  #   n_accum_bits: 2    # accumulator precision
  #   n_layers: 2        # number of quantized layers


# -----------------------------------------------------------------------------
# NOTES
# -----------------------------------------------------------------------------
#
# - Only models supported by Concrete ML can be used in FHE mode.
#
# - Run python main.py run-experiment --n-bits N once per value (in
#   parallel) to explore the accuracy/performance trade-off across n_bits.
#
# - Every run automatically:
#       - compute evaluation metrics
#       - perform resource profiling (time, memory, storage, FHE complexity)
#
# - Output files include n_bits in their names, ensuring:
#       - no overwriting
#       - reproducibility
#       - easy comparison
#
# Example output filenames:
#
#   results/metrics/
#     fhe__logistic_regression__heart_disease__n2__test__metrics.json
#
#   results/resource_profiles/
#     fhe__logistic_regression__heart_disease__n2.json
#
# -----------------------------------------------------------------------------