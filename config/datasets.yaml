# =============================================================================
# datasets.yaml — Dataset Configuration
# =============================================================================
#
# Each top-level key is a dataset name, which maps directly to:
#   - input:  data/raw/{name}.csv
#   - output: data/processed/{name}.csv
#
# FIELDS:
#   features      List of input column names (in the same order as the CSV)
#   target        Target column name
#
# PREPROCESSING:
#   binarize_target:
#     enabled     Set to true to binarize the target column
#     threshold   Values >= threshold → 1, values < threshold → 0
#
#   numeric / categorical:
#     columns     Columns to apply the steps to
#     steps       Ordered list of preprocessing steps to apply
#
#   Available numeric steps:
#     - impute_median     Fill missing values with column median
#     - impute_mean       Fill missing values with column mean
#     - standard_scale    Standardize to zero mean and unit variance
#     - minmax_scale      Scale to [0, 1] range
#
#   Available categorical steps:
#     - impute_mode       Fill missing values with most frequent value
#     - onehot_encode     One-hot encode the column
#
# ADDING A NEW DATASET:
#   1. Place the raw CSV in data/raw/{name}.csv
#   2. Add a new entry below following the same structure
#   3. Run Dataset("{name}", cfg="config/datasets.yaml").run()
#
# =============================================================================

heart_disease:
  features: [age, sex, cp, trestbps, chol, fbs, restecg, thalach, exang, oldpeak, slope, ca, thal]
  target: num
  preprocessing:
    binarize_target:
      enabled: true
      threshold: 1
    numeric:
      columns: [age, sex, cp, trestbps, chol, fbs, restecg, thalach, exang, oldpeak, slope, ca, thal]
      steps:
        - impute_median
        - standard_scale
    categorical:
      columns: []
      steps: []

diabetes:
  features: [Pregnancies, Glucose, BloodPressure, SkinThickness, Insulin, BMI, DiabetesPedigreeFunction, Age]
  target: Outcome
  preprocessing:
    binarize_target:
      enabled: false
      threshold: null
    numeric:
      columns: [Pregnancies, Glucose, BloodPressure, SkinThickness, Insulin, BMI, DiabetesPedigreeFunction, Age]
      steps:
        - impute_median
        - standard_scale
    categorical:
      columns: []
      steps: []

breast_cancer:
  features: [mean_radius, mean_texture, mean_perimeter, mean_area, mean_smoothness, mean_compactness, mean_concavity, mean_concave_points, mean_symmetry, mean_fractal_dimension, radius_error, texture_error, perimeter_error, area_error, smoothness_error, compactness_error, concavity_error, concave_points_error, symmetry_error, fractal_dimension_error, worst_radius, worst_texture, worst_perimeter, worst_area, worst_smoothness, worst_compactness, worst_concavity, worst_concave_points, worst_symmetry, worst_fractal_dimension]
  target: malignant
  preprocessing:
    binarize_target:
      enabled: false
      threshold: null
    numeric:
      columns: [mean_radius, mean_texture, mean_perimeter, mean_area, mean_smoothness, mean_compactness, mean_concavity, mean_concave_points, mean_symmetry, mean_fractal_dimension, radius_error, texture_error, perimeter_error, area_error, smoothness_error, compactness_error, concavity_error, concave_points_error, symmetry_error, fractal_dimension_error, worst_radius, worst_texture, worst_perimeter, worst_area, worst_smoothness, worst_compactness, worst_concavity, worst_concave_points, worst_symmetry, worst_fractal_dimension]
      steps:
        - impute_median
        - standard_scale
    categorical:
      columns: []
      steps: []