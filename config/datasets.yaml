  target: diagnosis
  preprocessing:
    binarize_target:
      enabled: false
      threshold: null
    numeric:
      columns: [mean_radius, mean_texture, mean_perimeter, mean_area, mean_smoothness, mean_compactness, mean_concavity, mean_concave_points, mean_symmetry, mean_fractal_dimension]
      steps:
        - impute_median
        - standard_scale
    categorical:
      columns: []
      steps: []