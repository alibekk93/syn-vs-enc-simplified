# =============================================================================
# synthesizers.yaml — Synthesizer Configuration
# =============================================================================
#
# Each top-level key is a synthesizer name.
#
# FIELDS:
#   method          Synthesizer method — must match a key in SUPPORTED_SYNTHESIZERS
#   num_rows        Number of synthetic rows to generate.
#                   Use "same" to match the size of the original dataset (default).
#   parameters      Passed directly to the SDV synthesizer constructor
#
#   Supported methods:
#     - gaussian_copula   (SDV)
#     - ctgan             (SDV)
#     - bayesian_network  (synthcity, pgmpy-backed)
#     - nflow             (synthcity, nflows-backed)
#     - arf               (synthcity, arfpy-backed)
#
#   Supported distributions (for gaussian_copula numerical_distributions):
#     norm, beta, truncnorm, uniform, gamma, gaussian_kde
#
# OUTPUT:
#   synthetic_dir     Where to save generated synthetic datasets
#   synthesizers_dir  Where to save fitted synthesizer objects
#
# DEVICE:
#   "cpu" or "cuda" — only applied to GPU_CAPABLE_SYNTHESIZERS in
#   synthesizers.py (ctgan, nflow, arf). gaussian_copula (statistical) and
#   bayesian_network (pgmpy structure search) have no GPU path and ignore
#   this setting. Override per-run with `--device cuda` (see
#   `main.py run-experiment` / `run-single-bootstrap`) rather than editing
#   this default, so the same config still works for local/CPU-only runs.
#
# ADDING A NEW METHOD:
#   1. Add a new entry below following the same structure
#   2. Register it in SUPPORTED_SYNTHESIZERS in synthesizers.py
#
# =============================================================================

split:
  test_size: 0.2
  random_state: 42
  stratify: true

output:
  synthetic_dir: data/processed
  synthesizers_dir: synthesizers

device: cpu

methods:
  gaussian_copula:
    num_rows: same             # "same" matches original dataset size, or set an integer
    parameters:
      enforce_min_max_values: true
      enforce_rounding: true
      default_distribution: norm
      numerical_distributions: {}

  ctgan:
    num_rows: same
    parameters:
      enforce_min_max_values: true
      enforce_rounding: true
      epochs: 300
      verbose: false
      # enable_gpu is set automatically from the top-level `device` setting
      # below — don't set it here.

  bayesian_network:
    num_rows: same
    parameters:
      struct_learning_n_iter: 100
      struct_learning_search_method: tree_search   # hillclimb, pc, tree_search, mmhc, exhaustive
      struct_learning_score: k2                    # k2, bdeu, bic, bds
      struct_max_indegree: 4
      encoder_max_clusters: 10
      encoder_noise_scale: 0.1

  nflow:
    num_rows: same
    parameters:
      n_iter: 100
      n_layers_hidden: 1
      n_units_hidden: 100
      batch_size: 200
      dropout: 0.1
      lr: 0.001
      base_transform_type: rq-autoregressive   # affine-coupling, quadratic-coupling, rq-coupling, affine-autoregressive, quadratic-autoregressive, rq-autoregressive

  arf:
    num_rows: same
    parameters:
      num_trees: 10
      delta: 0
      max_iters: 10
      early_stop: true
      verbose: false
      min_node_size: 5
