# =============================================================================
# visualization.yaml — Visualization Configuration
# =============================================================================

figures:
  dir: results/figures
  format: svg

# seaborn style / context — controls overall look and element scaling
# style:   white | whitegrid | ticks | darkgrid
# context: paper | notebook | talk | poster
style: "white"
context: "paper"

fonts:
  family: "sans-serif"    # matplotlib font.family
  title_size: 13
  title_weight: "normal"
  label_size: 11
  tick_size: 10

# Per-mode display labels and colors.
# Each mode belongs to a group (real / synthetic / fhe).
# Colors are auto-computed from the group's base_color + lightness_range —
# adding a new mode only requires adding an entry here with the correct group.
modes:
  standard:
    label: "Real"
    group: real
  gaussian_copula:
    label: "Gaussian Copula"
    group: synthetic
  ctgan:
    label: "CTGAN"
    group: synthetic
  fhe:
    label_prefix: "FHE"
    group: fhe

# Group-level color settings.
# Modes within a group share the base_color hue; lightness_range controls
# the auto-shading ramp when multiple modes are present in that group.
# [lightness_max, lightness_min] — lightest member first, darkest last.
groups:
  real:
    label: "Real"
    base_color: "#2ca02c"
  synthetic:
    label: "Synthetic"
    base_color: "#e07b2a"
    lightness_range: [0.65, 0.38]
  fhe:
    label: "FHE"
    base_color: "#1f77b4"
    lightness_range: [0.72, 0.32]

# Vertical separator lines drawn between mode groups on boxplots.
separators:
  enabled: true
  linewidth: 0.8
  color: "#cccccc"
  linestyle: "--"
  show_group_labels: true
  group_label_fontsize: 7
  group_label_color: "#aaaaaa"

boxplot:
  alpha: 0.65
  linewidth: 0.8
  notch: false
  showmeans: false
  mean_marker_color: "#555555"
  mean_marker_size: 6
  strip_alpha: 0.25
  strip_size: 2.5
  grid_alpha: 0.15
  despine: true            # remove top and right spines

metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - train_time
  - inf_time_per_sample
  - mem_inf_peak
