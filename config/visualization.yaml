# =============================================================================
# visualization.yaml — Visualization Configuration
# =============================================================================

figures:
  dir: results/figures
  format: svg

# seaborn style / context — controls overall look and element scaling
# style:   white | whitegrid | ticks | darkgrid
# context: paper | notebook | talk | poster
style: "white"
context: "paper"

fonts:
  family: "sans-serif"    # matplotlib font.family
  title_size: 13
  title_weight: "normal"
  label_size: 11
  tick_size: 10

colors:
  palette: "Set2"          # cleaner than tab10; or use a dict for full control
  strip_color: "0.55"      # neutral gray for jittered points when no hue

boxplot:
  alpha: 0.65
  linewidth: 0.8
  notch: false
  showmeans: false
  mean_marker_color: "#555555"
  mean_marker_size: 6
  strip_alpha: 0.25
  strip_size: 2.5
  grid_alpha: 0.15
  despine: true            # remove top and right spines

metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - train_time
  - inf_time_per_sample
  - mem_inf_peak
