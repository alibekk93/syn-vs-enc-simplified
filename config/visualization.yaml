# =============================================================================
# visualization.yaml — Visualization Configuration
# =============================================================================

figures:
  dir: results/figures
  format: svg

# seaborn style / context — controls overall look and element scaling
# style:   white | whitegrid | ticks | darkgrid
# context: paper | notebook | talk | poster
style: "white"
context: "paper"

fonts:
  family: "sans-serif"    # matplotlib font.family
  title_size: 15
  title_weight: "normal"
  label_size: 15
  tick_size: 13

# Per-mode display labels and colors.
# Each mode belongs to a group (real / synthetic / fhe). A mode may set an explicit
# `color:` (used for synthetic methods, so each is distinct); otherwise its colour
# comes from the group's base_color (+ lightness_range shading, used by FHE).
modes:
  standard:
    label: "Real"
    group: real
  # Synthetic methods each get a distinct Okabe-Ito colorblind-safe hue so
  # lines/violins are easy to tell apart — no lightness shading here.
  gaussian_copula:
    label: "Gaussian Copula"
    group: synthetic
    color: "#9467bd"        # purple
  ctgan:
    label: "CTGAN"
    group: synthetic
    color: "#d55e00"        # vermilion
  bayesian_network:
    label: "Bayesian Network"
    group: synthetic
    color: "#cc79a7"        # mauve
  nflow:
    label: "Normalizing Flow"
    group: synthetic
    color: "#0072b2"        # blue (swapped with FHE — was too close to CTGAN)
  arf:
    label: "ARF"
    group: synthetic
    color: "#e69f00"        # orange
  fhe:
    label_prefix: "FHE"
    group: fhe

# Group-level color settings.
# Modes within a group share the base_color hue; lightness_range controls
# the auto-shading ramp when multiple modes are present in that group.
# [lightness_max, lightness_min] — lightest member first, darkest last.
groups:
  real:
    label: "Real"
    base_color: "#009e73"    # Okabe-Ito bluish green
  synthetic:
    label: "Synthetic"
    base_color: "#e07b2a"    # fallback only; per-method colors are set under `modes`
  fhe:
    label: "FHE"
    base_color: "#8c564b"    # brown (swapped with Normalizing Flow)
    lightness_range: [0.72, 0.32]   # FHE keeps lightness shading by bit-width

# Per-model line colors for the FHE complexity-cost plots. That figure contains no
# mode colors, so this palette is independent of the mode colors above.
model_line_colors: ["#0072b2", "#d55e00", "#009e73", "#cc79a7", "#e69f00"]

# FHE training-time breakdown segment colors.
fhe_breakdown:
  fit_color: "#cccccc"            # "fit" segment (compile segment uses the FHE shade ramp)
  group_divider_color: "#dddddd"  # thin separator between model groups (multipanel)

# Vertical separator lines drawn between mode groups on boxplots.
separators:
  enabled: true
  linewidth: 0.8
  color: "#cccccc"
  linestyle: "--"
  show_group_labels: true
  group_label_fontsize: 13
  group_label_color: "#333333"

boxplot:
  alpha: 0.65
  linewidth: 0.8
  notch: false
  showmeans: false
  mean_marker_color: "#555555"
  mean_marker_size: 6
  strip_alpha: 0.25
  strip_size: 2.5
  grid_alpha: 0.15
  despine: true            # remove top and right spines

violinplot:
  alpha: 0.65
  linewidth: 0.8
  inner: "quartile"        # box | quartile | point | stick | None
  cut: 2
  strip_alpha: 0.25
  strip_size: 2.5
  grid_alpha: 0.15
  despine: true            # remove top and right spines

metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - train_time
  - inf_time_per_sample
  - mem_inf_peak
  - synth_fit_time

# Metrics plotted with a log-scaled y-axis (e.g. timing/memory metrics that
# can span orders of magnitude across modes). All other metrics use a linear axis.
log_scale_metrics:
  - inf_time_per_sample

# Radar overview figure — one polar panel per mode, aggregated over all
# datasets x models. Performance axes fill the TOP half (absolute [0,1] band);
# resource-cost axes fill the BOTTOM half (log + min-max across the shown modes,
# inverted) so "outward = better" on every axis. The two group hues are drawn
# from the Okabe-Ito palette and are validated colorblind-safe (blue vs
# vermilion: CVD dE >= 21, both >= 3:1 contrast on white).
radar:
  perf_color: "#0072b2"        # performance group (Okabe-Ito blue)
  resource_color: "#d55e00"    # resource group (Okabe-Ito vermilion)
  poly_color: "#2b2b2b"        # per-mode polygon — neutral, identical every panel
  baseline_color: "#8a8a8a"    # Real reference polygon (dashed, non-Real panels)
  grid_color: "#cfcfcf"        # concentric hairline gridlines
  # Performance-axis normalization:
  #   absolute -> map raw metric through perf_band (true magnitude, stable)
  #   minmax   -> per-axis min-max across the shown modes (max mode contrast)
  perf_norm: absolute
  perf_band: [0.5, 1.0]        # absolute radial band for performance axes
  fhe_n_bits: 8                # which FHE bit-width gets a panel
  primary_synth: [arf, bayesian_network, ctgan, gaussian_copula, nflow]
