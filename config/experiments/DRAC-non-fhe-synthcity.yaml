# =============================================================================
# DRAC-non-fhe-synthcity.yaml — Master Pipeline Configuration for DRAC testing (synthcity)
# =============================================================================
#
# Controls which pipelines run and what they operate on.
#
# Runs only synthcity-backed synthesizers (bayesian_network, nflow, arf).
# Intended for the DRAC venv that has synthcity installed but not sdv —
# pair with DRAC-non-fhe-sdv.yaml run in the sdv venv to reproduce a full
# DRAC-non-fhe.yaml-equivalent run split across both envs.
#
# DATASETS / MODELS:
#   Set to null to run all entries from their respective configs,
#   or provide a list to run a subset, e.g.:
#     datasets: [heart_disease, diabetes]
#
# FHE_MODE:
#   disable   — quantized inference in clear (fastest, no FHE)
#   simulate  — FHE simulation (recommended for development)
#   execute   — real FHE execution (slow, use for final evaluation)
#
# =============================================================================

datasets:     null
models:       null
synthesizers: [bayesian_network, nflow, arf]
fhe_mode:     disable

pipelines:
  preprocessing: true
  raw:           true
  synthetic:     true
  fhe:           false
