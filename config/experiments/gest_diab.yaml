# =============================================================================
# gest_diab.yaml — Gestational Diabetes Quick Experiment
# =============================================================================
#
# Runs a minimal pipeline on the gestational_diabetes dataset using only
# the xgboost model and standard (non-synthetic, non-FHE) training.
#
# PURPOSE:
#   - Quick validation run for a single dataset/model pair
#   - Debugging or fast iteration without synthetic data or FHE overhead
#
# SETTINGS:
#   datasets       Only gestational_diabetes dataset
#   models         Only xgboost model
#   synthesizers   Disabled (null but synthetic pipeline off)
#   fhe_mode       Disabled (not used since FHE pipeline is off)
#
# PIPELINES:
#   preprocessing  Enabled — prepares dataset
#   raw            Enabled — standard model training/evaluation
#   synthetic      Disabled
#   fhe            Disabled
#
# =============================================================================

datasets:     [gestational_diabetes]
models:       [xgboost]
synthesizers: null
fhe_mode:     disable

pipelines:
  preprocessing: true
  raw:           true
  synthetic:     false
  fhe:           false
  ablation:      false