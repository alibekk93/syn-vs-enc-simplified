# =============================================================================
# DRAC-non-fhe-sdv.yaml — Master Pipeline Configuration for DRAC testing (SDV)
# =============================================================================
#
# Controls which pipelines run and what they operate on.
#
# Runs only sdv-backed synthesizers (gaussian_copula, ctgan). Intended for
# the DRAC venv that has sdv installed but not synthcity — pair with
# DRAC-non-fhe-synthcity.yaml run in the synthcity venv to reproduce a full
# DRAC-non-fhe.yaml-equivalent run split across both envs.
#
# DATASETS / MODELS:
#   Set to null to run all entries from their respective configs,
#   or provide a list to run a subset, e.g.:
#     datasets: [heart_disease, diabetes]
#
# FHE_MODE:
#   disable   — quantized inference in clear (fastest, no FHE)
#   simulate  — FHE simulation (recommended for development)
#   execute   — real FHE execution (slow, use for final evaluation)
#
# =============================================================================

datasets:     null
models:       null
synthesizers: [gaussian_copula, ctgan]
fhe_mode:     disable

pipelines:
  preprocessing: true
  raw:           true
  synthetic:     true
  fhe:           false

bootstrap: false
